<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SweViceroy MTG</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <main id="app">

        <!-- =========================================================
             WELCOME SCREEN
        ========================================================== -->
        <section id="welcome-screen" class="screen active-screen">
            <div class="screen-content">
                <h1 class="game-title">SweViceroy MTG</h1>
                <p class="game-subtitle">A simplified MTG-style web card game</p>

                <div class="welcome-buttons">
                    <button id="start-btn" type="button">Start</button>
                    <button id="rules-btn" type="button">Rules / Tutorial</button>
                </div>
            </div>
        </section>

        <!-- =========================================================
             TUTORIAL SCREEN
             Hidden for now, will be built later
        ========================================================== -->
        <section id="tutorial-screen" class="screen hidden">
            <div class="screen-content">
                <h2>Tutorial Screen</h2>
                <p>Coming soon...</p>
            </div>
        </section>

        <!-- =========================================================
             LOGIN / BETTING SCREEN
             Hidden for now, will be built later
        ========================================================== -->
        <section id="login-screen" class="screen hidden">
            <div class="screen-content">
                <h2>Login / Betting Screen</h2>
                <p>Coming soon...</p>
            </div>
        </section>

        <!-- =========================================================
             LOADING SCREEN
             Hidden for now, will be built later
        ========================================================== -->
        <section id="loading-screen" class="screen hidden">
            <div class="screen-content">
                <h2>Loading Screen</h2>
                <p>Preparing game...</p>
            </div>
        </section>

        <!-- =========================================================
             MAIN GAME SCREEN
             Hidden for now, will be built later
        ========================================================== -->
        <section id="game-screen" class="screen hidden">
            <div class="screen-content">
                <h2>Main Game Screen</h2>
                <p>Game board will go here...</p>
            </div>
        </section>

        <!-- =========================================================
             GAME OVER SCREEN
             Hidden for now, will be built later
        ========================================================== -->
        <section id="gameover-screen" class="screen hidden">
            <div class="screen-content">
                <h2>Game Over Screen</h2>
                <p>Winner info will go here...</p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
